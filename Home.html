<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Welcome</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fff;
      --text: #1a1a1a;
      --text-muted: #555;
      --accent: #fe315d;
      --accent2: #087cfa;
      --nav-bg: #000000;
      --nav-text: #ffffff;
      --border: #e0e0e0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
    }

    nav p{
      color: #ffffff;
      font-size: 18px;
      font-weight: 600;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 72px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      color: var(--nav-text);
      text-decoration: none;
      font-size: 14px;
    }

    .main{
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: linear-gradient(90deg, #000000 10%,#470716  ,#B50027);
    }

    .hero {
      display: grid;
      grid-template-columns: 1fr 420px;
      align-items: center;
      padding: 80px 40px 100px;
      gap: 40px;
    }

    .hero-content h1 {
      font-size: 48px;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 28px;
      letter-spacing: -1px;
      color: white;
    }

    .hero-content p {
      font-size: 17px;
      color: white;
      line-height: 1.6;
      margin-bottom: 14px;
    }

  </style>
</head>
<body>

  <div class="main">
    <nav>
      <img src="logo2.png" class="nav-logo">
      <p>Al-Hurmain Engineers & Contractors</p>
      <ul class="nav-links">
        <li><a href="#">Services</a></li>
        <li><a href="#">Team</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>

    <section class="hero">
      <div class="hero-content">
        <h1>The Future, One Innovation at a Time</h1>
        <p><p>From concept to creation, we deliver cutting-edge solutions
          that power<br> industries and transform ideas into reality</p>
        </p>
      </div>
      <img src="people.jpg" alt="Hero Image" width="380px">
    </section>
  </div>

  <section class="services">
    <div></div>
    <div></div>
    <div></div>
  </section>

  <section class="contact">
    <div></div>
    <div></div>
    <div></div>
  </section>

</body>
</html>
